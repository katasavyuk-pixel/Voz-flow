<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    overflow: hidden;
    background: transparent;
    -webkit-app-region: drag;
    user-select: none;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Segoe UI", sans-serif;
  }
  #pill {
    position: absolute;
    top: 0; left: 0;
    height: 28px;
    border-radius: 14px;
    background: rgba(10, 10, 12, 0.88);
    border: 1px solid rgba(255, 255, 255, 0.04);
    box-shadow: 0 2px 16px rgba(0,0,0,0.4);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    overflow: hidden;
    transition: none;
  }
  #logo {
    width: 20px; height: 20px;
    margin-left: 4px;
    flex-shrink: 0;
    border-radius: 50%;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  #logo img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  #content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin: 0 3px;
  }
  canvas#visualizer { display: none; width: 100%; height: 22px; }

  /* Spinner (processing state) */
  .spinner { display: none; }

  /* Checkmark (done state) */
  .checkmark { display: none; }
  .checkmark svg { width: 14px; height: 14px; }

  /* Error X */
  .error-x { display: none; }
  .error-x svg { width: 14px; height: 14px; }
</style>
</head>
<body>
<div id="pill">
  <div id="logo">
    <img src="pill-logo.png" alt="">
  </div>
  <div id="content">
    <canvas id="visualizer"></canvas>
    <div class="spinner" id="spinner"></div>
    <div class="checkmark" id="checkmark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#50d278" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <div class="error-x" id="errorX">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ff4646" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </div>
  </div>
</div>

<script>
// === CONFIG ===
const PILL_WIDTH_IDLE = 32;
const PILL_WIDTH_RECORDING = 105;
const PILL_WIDTH_STATUS = 58;
const PILL_HEIGHT = 28;
const NUM_BARS = 28;

// Smoother spring physics
const SPRING_STIFFNESS = 18;
const SPRING_DAMPING = 6;

// === STATE ===
let currentState = "idle";
let currentWidth = PILL_WIDTH_IDLE;
let targetWidth = PILL_WIDTH_IDLE;
let animFrameId = null;

// Audio viz state
const barValues = new Float32Array(NUM_BARS);
const barVelocities = new Float32Array(NUM_BARS);
const barTargets = new Float32Array(NUM_BARS);

// Spinner state
let spinnerAngle = 0;

// DOM
const pill = document.getElementById("pill");
const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");
const spinnerEl = document.getElementById("spinner");
const checkmarkEl = document.getElementById("checkmark");
const errorXEl = document.getElementById("errorX");

// === PILL WIDTH ANIMATION ===
function animatePill() {
  const diff = targetWidth - currentWidth;
  if (Math.abs(diff) < 0.3) {
    currentWidth = targetWidth;
  } else {
    // Smoother easing
    currentWidth += diff * 0.14;
  }

  pill.style.width = Math.round(currentWidth) + "px";

  if (window.pillBridge) {
    window.pillBridge.requestResize(Math.round(currentWidth), PILL_HEIGHT);
  }

  if (currentState === "recording") {
    drawVisualizer();
  }

  if (currentState === "processing") {
    drawSpinner();
  }

  animFrameId = requestAnimationFrame(animatePill);
}

// === AUDIO VISUALIZER — smooth, subtle, professional ===
function updateBarPhysics() {
  const dt = 1.0 / 60;
  for (let i = 0; i < NUM_BARS; i++) {
    const diff = barTargets[i] - barValues[i];
    barVelocities[i] += diff * SPRING_STIFFNESS * dt;
    barVelocities[i] *= Math.max(0, 1.0 - SPRING_DAMPING * dt);
    barValues[i] += barVelocities[i] * dt;

    if (barValues[i] < 0.003) {
      barValues[i] = 0;
      barVelocities[i] = 0;
    } else if (barValues[i] > 1.0) {
      barValues[i] = 1.0;
    }
  }
}

function drawVisualizer() {
  updateBarPhysics();

  // Re-measure canvas every frame so it tracks the pill width animation
  resizeCanvas();

  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width;
  const rawH = canvas.height;
  if (w <= 0 || rawH <= 0) return;

  // Work in CSS coordinates (ctx is already scaled by dpr)
  const cssW = w / dpr;
  const h = rawH / dpr;

  ctx.clearRect(0, 0, cssW, h);
  const pad = 2;
  const availW = cssW - pad * 2;
  const gap = 1.0;
  const barW = Math.max(1, (availW - (NUM_BARS - 1) * gap) / NUM_BARS);
  const totalW = NUM_BARS * barW + (NUM_BARS - 1) * gap;
  const xOff = (cssW - totalW) / 2;
  const minH = 1;
  const centerIdx = NUM_BARS / 2;

  for (let i = 0; i < NUM_BARS; i++) {
    const val = barValues[i];
    const dist = Math.abs(i - centerIdx + 0.5) / centerIdx;
    // Wider, softer bell curve taper
    const taper = Math.exp(-dist * dist * 2.0);
    const barH = Math.max(minH, val * h * 1.4 * taper);
    const x = xOff + i * (barW + gap);
    const cy = h / 2;
    const y = cy - barH / 2;

    // Subtle glow — very faint
    if (val > 0.05) {
      const glowAlpha = val * 0.06 * taper;
      const glowSpread = barW + 2;
      ctx.fillStyle = `rgba(168, 140, 255, ${glowAlpha})`;
      ctx.beginPath();
      ctx.roundRect(x - (glowSpread - barW) / 2, y - 0.5, glowSpread, barH + 1, glowSpread / 2);
      ctx.fill();
    }

    // Main bar — soft white with hint of purple
    const peakAlpha = Math.min(0.55, ((70 + val * 120) * taper) / 255);
    const edgeAlpha = peakAlpha * 0.2;
    const gradient = ctx.createLinearGradient(x, y, x, y + barH);
    gradient.addColorStop(0, `rgba(200, 190, 255, ${edgeAlpha})`);
    gradient.addColorStop(0.4, `rgba(255, 255, 255, ${peakAlpha})`);
    gradient.addColorStop(0.6, `rgba(255, 255, 255, ${peakAlpha})`);
    gradient.addColorStop(1, `rgba(200, 190, 255, ${edgeAlpha})`);
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, barW / 2);
    ctx.fill();
  }
}

// === SPINNER — minimal dots ===
function drawSpinner() {
  spinnerEl.innerHTML = "";
  spinnerEl.style.position = "relative";
  spinnerEl.style.width = "16px";
  spinnerEl.style.height = "16px";

  for (let i = 0; i < 6; i++) {
    const angle = ((spinnerAngle + i * 60) * Math.PI) / 180;
    const dx = 6 * Math.cos(angle);
    const dy = 6 * Math.sin(angle);
    const alpha = Math.max(0.08, (180 - i * 30) / 255);

    const dot = document.createElement("div");
    dot.style.cssText = `
      position: absolute; width: 2px; height: 2px; border-radius: 50%;
      background: rgba(255,255,255,${alpha});
      left: ${8 + dx - 1}px; top: ${8 + dy - 1}px;
    `;
    spinnerEl.appendChild(dot);
  }
  spinnerAngle = (spinnerAngle + 4) % 360;
}

// === STATE MANAGEMENT ===
function setState(state) {
  currentState = state;

  canvas.style.display = "none";
  spinnerEl.style.display = "none";
  checkmarkEl.style.display = "none";
  errorXEl.style.display = "none";

  switch (state) {
    case "idle":
      targetWidth = PILL_WIDTH_IDLE;
      barTargets.fill(0);
      break;

    case "recording":
      targetWidth = PILL_WIDTH_RECORDING;
      canvas.style.display = "block";
      resizeCanvas();
      break;

    case "processing":
      targetWidth = PILL_WIDTH_STATUS;
      spinnerEl.style.display = "flex";
      spinnerEl.style.alignItems = "center";
      spinnerEl.style.justifyContent = "center";
      break;

    case "done":
      targetWidth = PILL_WIDTH_STATUS;
      checkmarkEl.style.display = "flex";
      checkmarkEl.style.alignItems = "center";
      checkmarkEl.style.justifyContent = "center";
      break;

    case "error":
      targetWidth = PILL_WIDTH_STATUS;
      errorXEl.style.display = "flex";
      errorXEl.style.alignItems = "center";
      errorXEl.style.justifyContent = "center";
      break;
  }

  // Subtle border color per state
  const borderColors = {
    idle: "rgba(255,255,255,0.04)",
    recording: "rgba(255,255,255,0.08)",
    processing: "rgba(168,140,255,0.15)",
    done: "rgba(80,210,120,0.2)",
    error: "rgba(255,70,70,0.2)",
  };
  pill.style.borderColor = borderColors[state] || borderColors.idle;
}

function resizeCanvas() {
  const contentEl = document.getElementById("content");
  const rect = contentEl.getBoundingClientRect();
  const newW = Math.max(10, Math.round(rect.width * window.devicePixelRatio));
  const newH = Math.max(10, Math.round(rect.height * window.devicePixelRatio));
  // Only resize if dimensions actually changed (avoids flicker)
  if (canvas.width !== newW || canvas.height !== newH) {
    canvas.width = newW;
    canvas.height = newH;
    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";
    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
  }
}

// === IPC BRIDGE ===
if (window.pillBridge) {
  window.pillBridge.onStateChange((state) => {
    setState(state);
  });

  window.pillBridge.onAudioData((data) => {
    if (currentState !== "recording") return;
    // Interpolate incoming data to NUM_BARS
    const srcLen = data.length;
    for (let i = 0; i < NUM_BARS; i++) {
      const srcIdx = (i / NUM_BARS) * srcLen;
      const lo = Math.floor(srcIdx);
      const hi = Math.min(lo + 1, srcLen - 1);
      const frac = srcIdx - lo;
      barTargets[i] = data[lo] * (1 - frac) + data[hi] * frac;
    }
  });
}

// === INIT ===
pill.style.width = PILL_WIDTH_IDLE + "px";
pill.style.height = PILL_HEIGHT + "px";
animatePill();
</script>
</body>
</html>
