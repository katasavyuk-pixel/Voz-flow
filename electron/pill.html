<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    overflow: hidden;
    background: transparent;
    -webkit-app-region: drag;
    user-select: none;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Segoe UI", sans-serif;
  }
  #pill {
    position: absolute;
    top: 0; left: 0;
    height: 36px;
    border-radius: 18px;
    background: rgba(15, 15, 15, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    overflow: hidden;
    transition: none;
  }
  #logo {
    width: 22px; height: 22px;
    margin-left: 7px;
    flex-shrink: 0;
    border-radius: 6px;
    background: linear-gradient(135deg, #a855f7, #06b6d4);
    display: flex; align-items: center; justify-content: center;
  }
  #logo svg { width: 12px; height: 12px; fill: white; }
  #content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin: 0 4px;
  }
  canvas#visualizer { display: none; width: 100%; height: 30px; }

  /* Spinner (processing state) */
  .spinner { display: none; }
  .spinner .dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: white;
    position: absolute;
  }

  /* Checkmark (done state) */
  .checkmark { display: none; }
  .checkmark svg { width: 14px; height: 14px; }

  /* Error X */
  .error-x { display: none; }
  .error-x svg { width: 14px; height: 14px; }
</style>
</head>
<body>
<div id="pill">
  <div id="logo">
    <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
  </div>
  <div id="content">
    <canvas id="visualizer"></canvas>
    <div class="spinner" id="spinner"></div>
    <div class="checkmark" id="checkmark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#50d278" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <div class="error-x" id="errorX">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ff4646" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </div>
  </div>
</div>

<script>
// === CONFIG (ported from SFlow) ===
const PILL_WIDTH_IDLE = 38;
const PILL_WIDTH_RECORDING = 140;
const PILL_WIDTH_STATUS = 72;
const PILL_HEIGHT = 36;
const NUM_BARS = 24;
const SPRING_STIFFNESS = 35;
const SPRING_DAMPING = 8;

// === STATE ===
let currentState = "idle";
let currentWidth = PILL_WIDTH_IDLE;
let targetWidth = PILL_WIDTH_IDLE;
let animFrameId = null;

// Audio viz state
const barValues = new Float32Array(NUM_BARS);
const barVelocities = new Float32Array(NUM_BARS);
const barTargets = new Float32Array(NUM_BARS);

// Spinner state
let spinnerAngle = 0;
let spinnerInterval = null;

// DOM
const pill = document.getElementById("pill");
const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");
const spinnerEl = document.getElementById("spinner");
const checkmarkEl = document.getElementById("checkmark");
const errorXEl = document.getElementById("errorX");

// === PILL WIDTH ANIMATION (ported from SFlow's _animate_width) ===
function animatePill() {
  const diff = targetWidth - currentWidth;
  if (Math.abs(diff) < 0.5) {
    currentWidth = targetWidth;
  } else {
    currentWidth += diff * 0.22;
  }

  pill.style.width = Math.round(currentWidth) + "px";

  // Request resize from main process
  if (window.pillBridge) {
    window.pillBridge.requestResize(Math.round(currentWidth), PILL_HEIGHT);
  }

  // Draw visualizer if recording
  if (currentState === "recording") {
    drawVisualizer();
  }

  // Draw spinner if processing
  if (currentState === "processing") {
    drawSpinner();
  }

  animFrameId = requestAnimationFrame(animatePill);
}

// === AUDIO VISUALIZER (ported from SFlow's AudioVisualizer) ===
function updateBarPhysics() {
  const dt = 1.0 / 60;
  for (let i = 0; i < NUM_BARS; i++) {
    const diff = barTargets[i] - barValues[i];
    barVelocities[i] += diff * SPRING_STIFFNESS * dt;
    barVelocities[i] *= Math.max(0, 1.0 - SPRING_DAMPING * dt);
    barValues[i] += barVelocities[i] * dt;

    if (barValues[i] < 0.005) {
      barValues[i] = 0;
      barVelocities[i] = 0;
    } else if (barValues[i] > 1.0) {
      barValues[i] = 1.0;
    }
  }
}

function drawVisualizer() {
  updateBarPhysics();

  const w = canvas.width;
  const h = canvas.height;
  if (w <= 0 || h <= 0) return;

  ctx.clearRect(0, 0, w, h);

  const barW = 1.8;
  const gap = 2.0;
  const totalW = NUM_BARS * barW + (NUM_BARS - 1) * gap;
  const xOff = (w - totalW) / 2;
  const minH = 2;
  const centerIdx = NUM_BARS / 2;

  for (let i = 0; i < NUM_BARS; i++) {
    const val = barValues[i];
    const dist = Math.abs(i - centerIdx + 0.5) / centerIdx;
    // Gaussian bell-curve taper from center (SFlow)
    const taper = Math.exp(-dist * dist * 1.2);
    const barH = Math.max(minH, val * h * 1.6 * taper);
    const x = xOff + i * (barW + gap);
    const cy = h / 2;
    const y = cy - barH / 2;

    // Glow layer
    if (val > 0.02) {
      const glowAlpha = val * 0.16 * taper;
      const glowSpread = barW + 3;
      ctx.fillStyle = `rgba(255, 255, 255, ${glowAlpha})`;
      ctx.beginPath();
      ctx.roundRect(x - (glowSpread - barW) / 2, y - 1, glowSpread, barH + 2, glowSpread / 2);
      ctx.fill();
    }

    // Main bar with vertical gradient
    const peakAlpha = ((100 + val * 155) * taper) / 255;
    const edgeAlpha = peakAlpha * 0.3;
    const gradient = ctx.createLinearGradient(x, y, x, y + barH);
    gradient.addColorStop(0, `rgba(255, 255, 255, ${edgeAlpha})`);
    gradient.addColorStop(0.35, `rgba(255, 255, 255, ${peakAlpha})`);
    gradient.addColorStop(0.65, `rgba(255, 255, 255, ${peakAlpha})`);
    gradient.addColorStop(1, `rgba(255, 255, 255, ${edgeAlpha})`);
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, barW / 2);
    ctx.fill();
  }
}

// === SPINNER (ported from SFlow) ===
function drawSpinner() {
  // Drawn via CSS-positioned dots, animated
  spinnerEl.innerHTML = "";
  spinnerEl.style.position = "relative";
  spinnerEl.style.width = "16px";
  spinnerEl.style.height = "16px";

  for (let i = 0; i < 6; i++) {
    const angle = ((spinnerAngle + i * 60) * Math.PI) / 180;
    const dx = 6 * Math.cos(angle);
    const dy = 6 * Math.sin(angle);
    const alpha = Math.max(0.12, (220 - i * 35) / 255);

    const dot = document.createElement("div");
    dot.style.cssText = `
      position: absolute; width: 2.5px; height: 2.5px; border-radius: 50%;
      background: rgba(255,255,255,${alpha});
      left: ${8 + dx - 1.25}px; top: ${8 + dy - 1.25}px;
    `;
    spinnerEl.appendChild(dot);
  }
  spinnerAngle = (spinnerAngle + 6) % 360;
}

// === STATE MANAGEMENT ===
function setState(state) {
  currentState = state;

  // Hide all content elements
  canvas.style.display = "none";
  spinnerEl.style.display = "none";
  checkmarkEl.style.display = "none";
  errorXEl.style.display = "none";

  if (spinnerInterval) {
    clearInterval(spinnerInterval);
    spinnerInterval = null;
  }

  switch (state) {
    case "idle":
      targetWidth = PILL_WIDTH_IDLE;
      barTargets.fill(0);
      break;

    case "recording":
      targetWidth = PILL_WIDTH_RECORDING;
      canvas.style.display = "block";
      // Size canvas to content area
      resizeCanvas();
      break;

    case "processing":
      targetWidth = PILL_WIDTH_STATUS;
      spinnerEl.style.display = "flex";
      spinnerEl.style.alignItems = "center";
      spinnerEl.style.justifyContent = "center";
      break;

    case "done":
      targetWidth = PILL_WIDTH_STATUS;
      checkmarkEl.style.display = "flex";
      checkmarkEl.style.alignItems = "center";
      checkmarkEl.style.justifyContent = "center";
      break;

    case "error":
      targetWidth = PILL_WIDTH_STATUS;
      errorXEl.style.display = "flex";
      errorXEl.style.alignItems = "center";
      errorXEl.style.justifyContent = "center";
      break;
  }

  // Update border color based on state
  const borderColors = {
    idle: "rgba(255,255,255,0.06)",
    recording: "rgba(239,68,68,0.3)",
    processing: "rgba(168,85,247,0.3)",
    done: "rgba(80,210,120,0.3)",
    error: "rgba(255,70,70,0.3)",
  };
  pill.style.borderColor = borderColors[state] || borderColors.idle;
}

function resizeCanvas() {
  // Canvas fills the content area
  const contentEl = document.getElementById("content");
  const rect = contentEl.getBoundingClientRect();
  canvas.width = Math.max(10, rect.width * window.devicePixelRatio);
  canvas.height = Math.max(10, rect.height * window.devicePixelRatio);
  canvas.style.width = rect.width + "px";
  canvas.style.height = rect.height + "px";
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}

// === IPC BRIDGE ===
if (window.pillBridge) {
  window.pillBridge.onStateChange((state) => {
    setState(state);
  });

  window.pillBridge.onAudioData((data) => {
    if (currentState !== "recording") return;
    // data is an array of bar target values [0..1]
    for (let i = 0; i < NUM_BARS && i < data.length; i++) {
      barTargets[i] = data[i];
    }
  });
}

// === INIT ===
pill.style.width = PILL_WIDTH_IDLE + "px";
pill.style.height = PILL_HEIGHT + "px";
animatePill();
</script>
</body>
</html>
